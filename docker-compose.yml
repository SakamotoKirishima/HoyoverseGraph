services:
  postgres:
    image: postgres:16
    container_name: hoyoverse-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: hoyoverse_graph
      POSTGRES_USER: hoyo
      POSTGRES_PASSWORD: hoyo_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
